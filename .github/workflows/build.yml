name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v2.9.0)'
        required: false
  push:
    branches: [master, main]
    paths:
      - 'imgconverter.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  test:
    name: Smoke-test (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        free-threaded: [false]
        include:
          - os: ubuntu-latest
            python-version: '3.14t'
            free-threaded: true
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pillow-jxl-plugin>=1.3.6" || echo "JXL optional dep unavailable on this OS"
          pip install pytest

      - name: Install ExifTool (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y exiftool

      - name: Install ExifTool (macOS)
        if: runner.os == 'macOS'
        run: brew install exiftool

      - name: Install ExifTool (Windows)
        if: runner.os == 'Windows'
        run: choco install exiftool -y

      - name: Audit Python dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --strict --desc || echo "::warning::pip-audit found vulnerabilities — review before release"

      - name: Run pytest
        env:
          PYTEST_QT_API: pyqt6
        run: python -m pytest

  build:
    needs: test
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ImgConverter-Windows.exe
            pyinstaller_args: --onefile --windowed --name ImgConverter --collect-all pillow_heif
          - os: macos-latest
            artifact: ImgConverter-macOS
            pyinstaller_args: --onefile --windowed --name ImgConverter --collect-all pillow_heif
          - os: ubuntu-latest
            artifact: ImgConverter-Linux
            pyinstaller_args: --onefile --name ImgConverter --collect-all pillow_heif

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.11"
          pip install "pillow-jxl-plugin>=1.3.6" || true
          pip install "rawpy>=0.27.0" || true
          pip install "qoi>=0.7" || true

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.pyinstaller_args }} imgconverter.py

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/ImgConverter dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/ImgConverter.exe dist/${{ matrix.artifact }}

      - name: Generate trust artifacts
        shell: pwsh
        run: |
          $artifact = "${{ matrix.artifact }}"
          $path = Join-Path "dist" $artifact
          $hash = (Get-FileHash -Algorithm SHA256 $path).Hash.ToLowerInvariant()
          "$hash  $artifact" | Set-Content -Encoding utf8 "dist/$artifact.sha256"

          $deps = @(python -m pip freeze --all | Sort-Object)
          $deps | Set-Content -Encoding utf8 "dist/$artifact.dependencies.txt"
          $packages = @()
          foreach ($dep in $deps) {
            if ($dep -match '^([^=<>!~]+)==(.+)$') {
              $name = $matches[1]
              $version = $matches[2]
              $packages += [ordered]@{
                name = $name
                version = $version
                purl = "pkg:pypi/$($name.ToLowerInvariant())@$version"
              }
            } elseif ($dep.Trim()) {
              $packages += [ordered]@{ name = $dep; version = $null; purl = $null }
            }
          }
          # Enumerate native binaries collected by PyInstaller
          $nativeBins = @()
          $distDir = "dist"
          $collectDirs = @(
            (Join-Path $distDir "ImgConverter" "_internal"),
            (Join-Path $distDir "ImgConverter")
          )
          foreach ($dir in $collectDirs) {
            if (Test-Path $dir) {
              Get-ChildItem -Path $dir -Recurse -File -Include "*.dll","*.so","*.dylib","*.pyd" -ErrorAction SilentlyContinue | ForEach-Object {
                $binHash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
                $nativeBins += [ordered]@{
                  name = $_.Name
                  relative_path = $_.FullName.Replace((Resolve-Path $distDir).Path, "").TrimStart("\", "/")
                  size_bytes = $_.Length
                  sha256 = $binHash
                }
              }
            }
          }

          [ordered]@{
            schema = "imgconverter.dependency-sbom.v2"
            artifact = $artifact
            sha256 = $hash
            packages = $packages
            native_binaries = $nativeBins
          } | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 "dist/$artifact.sbom.json"

          [ordered]@{
            schema = "imgconverter.provenance.v1"
            artifact = $artifact
            sha256 = $hash
            unsigned = $true
            repository = "${{ github.repository }}"
            ref = "${{ github.ref }}"
            commit = "${{ github.sha }}"
            run_id = "${{ github.run_id }}"
            run_attempt = "${{ github.run_attempt }}"
            runner_os = "${{ runner.os }}"
            python = "3.12"
            pyinstaller_args = "${{ matrix.pyinstaller_args }}"
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 "dist/$artifact.provenance.json"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
            dist/${{ matrix.artifact }}.dependencies.txt
            dist/${{ matrix.artifact }}.sbom.json
            dist/${{ matrix.artifact }}.provenance.json

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release checksum manifest
        run: |
          find artifacts -maxdepth 1 -type f \
            ! -name '*.sha256' \
            ! -name '*.dependencies.txt' \
            ! -name '*.sbom.json' \
            ! -name '*.provenance.json' \
            -print0 | sort -z | xargs -0 sha256sum > artifacts/SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "ImgConverter ${{ github.event.inputs.version }}" \
            --generate-notes \
            || true
          gh release upload "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/*
