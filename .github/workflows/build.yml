name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v2.9.0)'
        required: false
  push:
    branches: [master, main]
    paths:
      - 'imgconverter.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  test:
    name: Smoke-test (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pillow-jxl-plugin>=1.3.6" || echo "JXL optional dep unavailable on this OS"
          pip install pytest

      - name: Install ExifTool (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y exiftool

      - name: Install ExifTool (macOS)
        if: runner.os == 'macOS'
        run: brew install exiftool

      - name: Run pytest
        env:
          PYTEST_QT_API: pyqt6
        run: python -m pytest

  build:
    needs: test
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ImgConverter-Windows.exe
            pyinstaller_args: --onefile --windowed --name ImgConverter --collect-all pillow_heif
          - os: macos-latest
            artifact: ImgConverter-macOS
            pyinstaller_args: --onefile --windowed --name ImgConverter --collect-all pillow_heif
          - os: ubuntu-latest
            artifact: ImgConverter-Linux
            pyinstaller_args: --onefile --name ImgConverter --collect-all pillow_heif

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.11"
          pip install "pillow-jxl-plugin>=1.3.6" || true
          pip install "rawpy>=0.27.0" || true
          pip install "qoi>=0.7" || true

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.pyinstaller_args }} imgconverter.py

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/ImgConverter dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/ImgConverter.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.version != ''

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "ImgConverter ${{ github.event.inputs.version }}" \
            --generate-notes \
            || true
          gh release upload "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/*
